services:
  mcp-server-odoo:
    build: .
    # Image construite localement depuis le Dockerfile du repo.
    container_name: mcp-server-odoo
    restart: unless-stopped

    # Toutes les variables Odoo sont lues depuis .env (jamais commite).
    env_file:
      - .env

    # On force le transport HTTP et le bind sur 0.0.0.0 pour que Traefik
    # (autre container) puisse joindre le service via le reseau Docker.
    environment:
      ODOO_MCP_TRANSPORT: streamable-http
      ODOO_MCP_HOST: 0.0.0.0
      ODOO_MCP_PORT: "8000"

    # PAS de `ports:` => rien n'est expose directement sur le VPS.
    # Seul Traefik, via le reseau n8n_default, route vers le 8000 interne.

    networks:
      - traefik

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    labels:
      - "traefik.enable=true"
      # Reseau Traefik (defaut = ta convention n8n_default, surchargeable via .env)
      - "traefik.docker.network=${TRAEFIK_NETWORK:-n8n_default}"

      # --- Router HTTPS (calque sur tes autres MCP) ---
      - "traefik.http.routers.mcp-odoo.rule=Host(`${MCP_DOMAIN}`)"
      - "traefik.http.routers.mcp-odoo.entrypoints=websecure"
      - "traefik.http.routers.mcp-odoo.tls=true"
      - "traefik.http.routers.mcp-odoo.tls.certresolver=${TRAEFIK_CERTRESOLVER:-mytlschallenge}"

      # --- Service (port interne du MCP) ---
      - "traefik.http.services.mcp-odoo.loadbalancer.server.port=8000"

      # --- Basic Auth (le transport MCP n'a AUCUNE auth integree) ---
      # MCP_BASIC_AUTH = sortie de `htpasswd -nbB user 'motdepasse'`
      # Dans le .env, double chaque $ en $$ .
      - "traefik.http.middlewares.mcp-odoo-auth.basicauth.users=${MCP_BASIC_AUTH}"
      - "traefik.http.routers.mcp-odoo.middlewares=mcp-odoo-auth"

networks:
  # Reseau externe deja cree par ta stack Traefik (projet n8n).
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-n8n_default}
